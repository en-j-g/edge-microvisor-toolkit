---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-kube-system-ingress
  namespace: kube-system
spec:
  podSelector: {}  # Apply to all pods in kube-system
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: UDP
          port: 53    # DNS
        - protocol: TCP
          port: 10250 # kubelet metrics
        - protocol: TCP
          port: 6443   # kube-apiserver
